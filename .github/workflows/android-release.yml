name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version (e.g. 1.0.0)"
        required: false
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericwvi/tauri-android-builder:latest
      options: --user root # run as root to ensure we have permissions
      env: # key: mapping host env vars to container env vars
        #      to ensure the build tools can find the Android SDK and NDK
        ANDROID_HOME: /opt/android-sdk
        NDK_HOME: /opt/android-sdk/ndk/27.2.12479018

    strategy:
      fail-fast: false
      matrix:
        app_type: [flomo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Cargo & Rust
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
            client/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Set Version and Initialize
        working-directory: ./client
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            CLEAN_VERSION=${GITHUB_REF#refs/tags/v}
          else
            CLEAN_VERSION="${{ github.event.inputs.version }}"
          fi
          echo "Building version: $CLEAN_VERSION"

          cp ./src-tauri/tauri.${{ matrix.app_type }}.conf.json ./src-tauri/tauri.conf.json

          node -e "
            const fs = require('fs');
            ['package.json', './src-tauri/tauri.conf.json'].forEach(file => {
              if (fs.existsSync(file)) {
                let j = JSON.parse(fs.readFileSync(file));
                j.version = '$CLEAN_VERSION';
                fs.writeFileSync(file, JSON.stringify(j, null, 2));
              }
            });
          "

          npm run tauri android init -- --ci || true

      - name: Inject Android XML Patches
        working-directory: ./client
        run: node src-tauri/scripts/apply-android-xml.js

      - name: Build Android APK (ARM64)
        working-directory: ./client
        run: npm run tauri android build -- --target aarch64

      - name: Setup Keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/release-keystore.jks" >> $GITHUB_ENV

      - name: Sign APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using build-tools from: $BUILD_TOOLS_PATH"

          APK_UNSIGNED="client/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          APK_SIGNED="client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk"

          # use apksigner from the Android SDK build-tools in the container
          $BUILD_TOOLS_PATH/apksigner sign \
            --ks $KEYSTORE_PATH \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --ks-key-alias release-key \
            --out "$APK_SIGNED" \
            "$APK_UNSIGNED"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-${{ matrix.app_type }}
          path: client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk
          append_body: true
          generate_release_notes: true
