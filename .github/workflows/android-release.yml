name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericwvi/tauri-android-builder:latest
      env:
        NDK_HOME: /opt/android-sdk/ndk/27.2.12479018

    strategy:
      fail-fast: false
      matrix:
        app_type: [flomo]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Cargo & NPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            client/src-tauri/target
            client/node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('client/package-lock.json') }}

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Initialize Tauri Android
        working-directory: ./client
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # Triggered by tag push (remove 'v' prefix)
            CLEAN_VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Triggered by manual workflow dispatch
            CLEAN_VERSION="${{ github.event.inputs.version }}"
          fi
          sed -i "s/\"version\": \"0.1.0\"/\"version\": \"$CLEAN_VERSION\"/g" package.json
          cp ./src-tauri/tauri.${{ matrix.app_type }}.conf.json ./src-tauri/tauri.conf.json
          sed -i "s/\"version\": \"0.1.0\"/\"version\": \"$CLEAN_VERSION\"/g" ./src-tauri/tauri.conf.json
          npm run tauri android init -- --ci || true

      - name: Inject Android XML Patches
        working-directory: ./client
        run: node src-tauri/scripts/apply-android-xml.js

      - name: Build Android APK (ARM64)
        working-directory: ./client
        run: npm run tauri android build -- --target aarch64

      - name: Setup Keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/release-keystore.jks" >> $GITHUB_ENV

      - name: Sign APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Sign and align the APK using apksigner (modern approach)
          $ANDROID_HOME/build-tools/36.0.0/apksigner sign \
            --ks $KEYSTORE_PATH \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --ks-key-alias release-key \
            --out client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk \
            client/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

          # Verify the signature
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose \
            client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-${{ matrix.app_type }}
          path: client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            client/src-tauri/gen/android/app/build/outputs/apk/universal/release/${{ matrix.app_type }}-release.apk
          append_body: true
          draft: false
          prerelease: false
