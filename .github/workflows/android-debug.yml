name: Android Debug

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: "App type to build"
        required: true
        default: "flomo"
        type: choice
        options:
          - flomo

permissions:
  contents: read

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericwvi/tauri-android-builder:latest
      env:
        NDK_HOME: /opt/android-sdk/ndk/27.2.12479018

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Cargo & NPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            client/src-tauri/target
            client/node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('client/package-lock.json') }}

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Initialize Tauri Android
        working-directory: ./client
        run: |
          cp ./src-tauri/tauri.${{ github.event.inputs.app_type }}.conf.json ./src-tauri/tauri.conf.json
          npm run tauri android init -- --ci || true

      - name: Inject Android XML Patches
        working-directory: ./client
        run: node src-tauri/scripts/apply-android-xml.js

      - name: Build Android Debug APK (ARM64)
        working-directory: ./client
        run: npm run tauri android build -- --target aarch64 --debug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apk-${{ github.event.inputs.app_type }}
          path: client/src-tauri/gen/android/app/build/outputs/apk/*/debug/*.apk
