name: Android Debug

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'App type to build'
        required: true
        default: 'flomo'
        type: choice
        options:
          - flomo

permissions:
  contents: read

jobs:
  build-android-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Initialize Tauri Android
        working-directory: ./client
        run: |
          cp ./src-tauri/tauri.${{ github.event.inputs.app_type }}.conf.json ./src-tauri/tauri.conf.json
          npm run tauri android init -- --ci || true

      - name: Build Android Debug APK (ARM64)
        working-directory: ./client
        run: npm run tauri android build -- --target aarch64 --debug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.event.inputs.app_type }}
          path: |
            client/src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
            client/src-tauri/gen/android/app/build/outputs/apk/*/debug/*.apk
